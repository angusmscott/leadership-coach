<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Leadership Equation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-shell">
        <!-- Sidebar with equation variables -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="/static/leadership-equation.png" alt="The Leadership Equation: Lp = i(U)x" class="equation-image">
                <p class="brand-subtitle">Developmental Copilot</p>
            </div>

            <nav class="equation-nav">
                <div class="nav-label">The Equation</div>
                <button class="eq-var" data-var="context" title="Context — The surrounding system">
                    <span class="var-symbol">Context</span>
                    <span class="var-desc">The surrounding system</span>
                </button>
                <button class="eq-var" data-var="i" title="i — Leadership Identity">
                    <span class="var-symbol">i</span>
                    <span class="var-desc">Leadership Identity</span>
                </button>
                <button class="eq-var" data-var="u" title="U — Presence">
                    <span class="var-symbol">U</span>
                    <span class="var-desc">Presence</span>
                </button>
                <button class="eq-var" data-var="x" title="x — Impact">
                    <span class="var-symbol">x</span>
                    <span class="var-desc">Impact</span>
                </button>
                <button class="eq-var" data-var="spark" title="Spark — The deeper source">
                    <span class="var-symbol">Spark</span>
                    <span class="var-desc">The deeper source</span>
                </button>
            </nav>

            <div class="awareness-section">
                <div class="nav-label">Awareness Scale</div>
                <div class="scale-levels">
                    <div class="scale-level">
                        <span class="level-num">1</span>
                        <span class="level-label">Reactive</span>
                    </div>
                    <div class="scale-level">
                        <span class="level-num">2</span>
                        <span class="level-label">Reflective</span>
                    </div>
                    <div class="scale-level">
                        <span class="level-num">3</span>
                        <span class="level-label">Embodied</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="act-badge">
                    <span class="act-letter">A</span>wareness
                    <span class="act-letter">C</span>hoice
                    <span class="act-letter">T</span>ransformation
                </div>
            </div>
        </aside>

        <!-- Main chat area -->
        <main class="chat-main">
            <header class="chat-header">
                <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="header-content">
                    <h2 class="header-title">Reflection Space</h2>
                    <span class="header-hint">A space to notice, not to fix</span>
                </div>
                <button class="new-chat-btn" id="new-chat-btn" title="New reflection">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </header>

            <div id="messages" class="messages">
                <!-- Messages render here -->
            </div>

            <div class="input-area">
                <form id="chat-form" class="chat-form">
                    <div class="input-wrapper">
                        <textarea
                            id="message-input"
                            placeholder="What's on your mind?"
                            rows="1"
                            required
                        ></textarea>
                        <button type="submit" id="send-btn" aria-label="Send">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <p class="input-disclaimer">This is a reflective companion, not a coach or therapist. For professional support, please work with a qualified practitioner.</p>
                </form>
            </div>
        </main>
    </div>

    <!-- Variable info modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="var-modal">
            <button class="modal-close" id="modal-close">&times;</button>
            <h3 class="modal-title" id="modal-title"></h3>
            <p class="modal-body" id="modal-body"></p>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
